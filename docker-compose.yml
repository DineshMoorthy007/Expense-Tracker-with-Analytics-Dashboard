services:
  db:
    image: mysql:8.4
    container_name: expense-tracker-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: expense_tracker
      MYSQL_USER: expense_user
      MYSQL_PASSWORD: expense_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3306:3306"
    volumes:
      - expense_tracker_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pexpense_pass"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./expense-tracker-backend/expense-tracker
      dockerfile: Dockerfile
    container_name: expense-tracker-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_USERNAME: expense_user
      DB_PASSWORD: expense_pass
      JWT_SECRET: change-this-secret-to-a-long-random-value-change-this-secret
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/expense_tracker?createDatabaseIfNotExist=true
      SERVER_PORT: 8080
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080
    container_name: expense-tracker-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  expense_tracker_db_data: